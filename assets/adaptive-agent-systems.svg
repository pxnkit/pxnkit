<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Pankit — Reliable Adaptive Agent Systems</title>
  <desc id="desc">A visual pipeline from evidence search through memory, adaptation, verification, and safe action or abstention.</desc>

  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="52%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="52%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <radialGradient id="glowCyan">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowViolet">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#94a3b8" stroke-opacity=".055" stroke-width="1"/>
    </pattern>
    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 Z" fill="#64748b"/>
    </marker>
  </defs>

  <rect x="1" y="1" width="1398" height="418" rx="28" fill="url(#background)" stroke="#334155" stroke-width="2"/>
  <rect x="1" y="1" width="1398" height="418" rx="28" fill="url(#grid)"/>
  <circle cx="126" cy="64" r="210" fill="url(#glowCyan)"/>
  <circle cx="1250" cy="342" r="240" fill="url(#glowViolet)"/>

  <rect x="70" y="52" width="6" height="113" rx="3" fill="url(#accent)" filter="url(#softGlow)"/>
  <text x="98" y="92" fill="#f8fafc" font-size="38" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="750" letter-spacing="4">PANKIT</text>
  <text x="98" y="132" fill="#cbd5e1" font-size="21" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600" letter-spacing="1.3">RELIABLE ADAPTIVE AGENT SYSTEMS</text>
  <text x="98" y="164" fill="#94a3b8" font-size="17" font-family="Inter, Segoe UI, Arial, sans-serif">Agentic search · memory routing · test-time learning · safe tool use</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <line x1="255" y1="272" x2="345" y2="272" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="515" y1="272" x2="605" y2="272" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="775" y1="272" x2="865" y2="272" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="1035" y1="272" x2="1125" y2="272" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

    <g transform="translate(90 222)">
      <rect width="165" height="100" rx="18" fill="#0f2435" stroke="#22d3ee" stroke-opacity=".72"/>
      <circle cx="44" cy="42" r="17" fill="none" stroke="#22d3ee" stroke-width="4"/>
      <line x1="57" y1="55" x2="70" y2="68" stroke="#22d3ee" stroke-width="4" stroke-linecap="round"/>
      <text x="88" y="44" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">SEEK</text>
      <text x="82.5" y="79" fill="#7dd3fc" font-size="12" text-anchor="middle">evidence</text>
    </g>

    <g transform="translate(350 222)">
      <rect width="165" height="100" rx="18" fill="#171a3a" stroke="#818cf8" stroke-opacity=".76"/>
      <ellipse cx="43" cy="34" rx="24" ry="10" fill="none" stroke="#818cf8" stroke-width="3"/>
      <path d="M19 34v24c0 6 11 10 24 10s24-4 24-10V34 M19 46c0 6 11 10 24 10s24-4 24-10" fill="none" stroke="#818cf8" stroke-width="3"/>
      <text x="108" y="44" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">MEMORY</text>
      <text x="82.5" y="79" fill="#a5b4fc" font-size="12" text-anchor="middle">route + retain</text>
    </g>

    <g transform="translate(610 222)">
      <rect width="165" height="100" rx="18" fill="#241839" stroke="#a78bfa" stroke-opacity=".78"/>
      <path d="M59 34a24 24 0 1 0 2 28" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
      <path d="M57 24l4 15-15-4" fill="none" stroke="#a78bfa" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="109" y="44" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">ADAPT</text>
      <text x="82.5" y="79" fill="#c4b5fd" font-size="12" text-anchor="middle">learn at test time</text>
    </g>

    <g transform="translate(870 222)">
      <rect width="165" height="100" rx="18" fill="#102b2a" stroke="#2dd4bf" stroke-opacity=".76"/>
      <path d="M43 21l24 9v18c0 18-10 28-24 35-14-7-24-17-24-35V30z" fill="none" stroke="#2dd4bf" stroke-width="3"/>
      <path d="M31 50l8 8 17-19" fill="none" stroke="#2dd4bf" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="111" y="44" fill="#e2e8f0" font-size="16" font-weight="700" text-anchor="middle">VERIFY</text>
      <text x="82.5" y="79" fill="#99f6e4" font-size="12" text-anchor="middle">ground + calibrate</text>
    </g>

    <g transform="translate(1130 222)">
      <rect width="180" height="100" rx="18" fill="#10291f" stroke="#34d399" stroke-opacity=".8"/>
      <path d="M27 43h34 M51 31l12 12-12 12" fill="none" stroke="#34d399" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M27 69h36" fill="none" stroke="#fbbf24" stroke-width="4" stroke-linecap="round"/>
      <text x="119" y="43" fill="#e2e8f0" font-size="15" font-weight="700" text-anchor="middle">ACT</text>
      <text x="119" y="64" fill="#94a3b8" font-size="11" text-anchor="middle">or</text>
      <text x="119" y="82" fill="#fbbf24" font-size="13" font-weight="700" text-anchor="middle">ABSTAIN</text>
    </g>
  </g>

  <rect x="90" y="355" width="1220" height="1" fill="url(#accent)" opacity=".36"/>
  <text x="700" y="386" text-anchor="middle" fill="#64748b" font-size="13" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="2">
    EVIDENCE  •  PROVENANCE  •  UNCERTAINTY  •  RELIABILITY  •  SAFE ACTION
  </text>
</svg>

